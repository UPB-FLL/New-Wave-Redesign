      <circle cx="774" cy="290" r="6" fill="#4ade80"/>
      <circle cx="774" cy="333" r="6" fill="#2dd4bf"/>
      <circle cx="774" cy="376" r="6" fill="#4ade80"/>
      <circle cx="774" cy="419" r="6" fill="#2dd4bf"/>
      <circle cx="774" cy="462" r="6" fill="#4ade80"/>
      <rect x="800" y="286" width="225" height="8" rx="8" fill="#21c8d8" fill-opacity="0.28"/>
      <rect x="800" y="329" width="205" height="8" rx="8" fill="#21c8d8" fill-opacity="0.28"/>
      <rect x="800" y="372" width="185" height="8" rx="8" fill="#21c8d8" fill-opacity="0.28"/>
      <rect x="800" y="415" width="165" height="8" rx="8" fill="#21c8d8" fill-opacity="0.28"/>
      <rect x="800" y="458" width="145" height="8" rx="8" fill="#21c8d8" fill-opacity="0.28"/>
      <rect x="1040" y="286" width="78" height="8" rx="8" fill="#4ade80" fill-opacity="0.24"/>
      <rect x="1040" y="329" width="78" height="8" rx="8" fill="#4ade80" fill-opacity="0.24"/>
      <rect x="1040" y="372" width="78" height="8" rx="8" fill="#4ade80" fill-opacity="0.24"/>
      <rect x="1040" y="415" width="78" height="8" rx="8" fill="#4ade80" fill-opacity="0.24"/>
      <rect x="1040" y="458" width="78" height="8" rx="8" fill="#4ade80" fill-opacity="0.24"/>
    </g>
  </g>

  <g opacity="0.78">
    <ellipse cx="435" cy="361" rx="80" ry="56" fill="#122e45" stroke="#21c8d8" stroke-opacity="0.24"/>
    <ellipse cx="558" cy="328" rx="103" ry="83" fill="#122e45" stroke="#21c8d8" stroke-opacity="0.24"/>
    <ellipse cx="685" cy="363" rx="75" ry="54" fill="#122e45" stroke="#21c8d8" stroke-opacity="0.24"/>
    <rect x="390" y="350" width="330" height="92" rx="42" fill="#122e45" stroke="#21c8d8" stroke-opacity="0.24"/>
    <path d="M589 300 L635 333 L622 398 L557 398 L544 333 Z" fill="#14b8c4" fill-opacity="0.18" stroke="#2dd4bf" stroke-opacity="0.64" stroke-width="2"/>
  </g>

  <g>
    <g fill="#2dd4bf" filter="url(#soft)" opacity="0.28">
      <circle cx="430" cy="250" r="23"/><circle cx="655" cy="235" r="23"/><circle cx="505" cy="530" r="23"/>
      <circle cx="910" cy="105" r="23"/><circle cx="1190" cy="505" r="23"/><circle cx="330" cy="630" r="23"/><circle cx="1215" cy="285" r="23"/>
    </g>
    <g fill="#2dd4bf">
      <circle cx="430" cy="250" r="8"/><circle cx="655" cy="235" r="8"/><circle cx="505" cy="530" r="8"/>
      <circle cx="910" cy="105" r="8" fill="#4ade80"/><circle cx="1190" cy="505" r="8"/><circle cx="330" cy="630" r="8"/><circle cx="1215" cy="285" r="8" fill="#4ade80"/>
