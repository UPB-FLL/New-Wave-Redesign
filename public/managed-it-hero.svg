<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" role="img" aria-labelledby="title desc">
  <title id="title">Managed IT services abstract hero artwork</title>
  <desc id="desc">Abstract cloud, server dashboard, security shield, and connected network nodes in New Wave IT brand colors.</desc>
  <defs>
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#14b8c4" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#14b8c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#21c8d8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#21c8d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#21c8d8" stop-opacity="0.1"/>
      <stop offset="0.48" stop-color="#2dd4bf" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="veilLeft" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#081726" stop-opacity="0.98"/>
      <stop offset="0.68" stop-color="#081726" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#081726" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="veilBottom" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#081726" stop-opacity="0"/>
      <stop offset="1" stop-color="#081726" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1440" height="800" fill="#081726"/>
  <circle cx="1120" cy="116" r="380" fill="url(#tealGlow)"/>
  <circle cx="610" cy="340" r="270" fill="url(#cyanGlow)"/>
  <circle cx="1200" cy="610" r="260" fill="url(#greenGlow)"/>

  <g stroke="url(#lineGrad)" stroke-width="2" fill="none" opacity="0.9">
    <path d="M430 250 L910 105 L1215 285"/>
    <path d="M505 530 L950 365 L1190 505"/>
    <path d="M330 630 L710 676 L1040 650" opacity="0.55"/>
    <path d="M455 470 L815 585" opacity="0.58"/>
    <path d="M690 220 L1020 -42" opacity="0.56"/>
  </g>

  <g opacity="0.95" filter="url(#shadow)">
    <rect x="705" y="170" width="480" height="360" rx="28" fill="#0c2236" fill-opacity="0.82" stroke="#2dd4bf" stroke-opacity="0.28" stroke-width="1.5"/>
    <rect x="735" y="205" width="420" height="46" rx="18" fill="#122e45" fill-opacity="0.84" stroke="#fff" stroke-opacity="0.08"/>
    <g fill="#081726" fill-opacity="0.66" stroke="#fff" stroke-opacity="0.08">
      <rect x="750" y="275" width="390" height="30" rx="12"/>
      <rect x="750" y="318" width="390" height="30" rx="12"/>
      <rect x="750" y="361" width="390" height="30" rx="12"/>
      <rect x="750" y="404" width="390" height="30" rx="12"/>
